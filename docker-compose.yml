networks:
  cfp_network:
    driver: bridge
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /entrypoint.sh
    container_name: cfp_backend_prod
    depends_on:
    - db
    environment:
    - DB_ENGINE=django.db.backends.mysql
    - DB_NAME=${MYSQL_DATABASE:-CFP}
    - DB_USER=${MYSQL_USER:-cfp_user}
    - DB_PASSWORD=${MYSQL_PASSWORD}
    - DB_HOST=db
    - DB_PORT=3306
    - DJANGO_ALLOWED_HOSTS=gestion.politecnico.ar,localhost,127.0.0.1
    - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
    - SECRET_KEY=${SECRET_KEY}
    - CORS_ALLOWED_ORIGINS=http://localhost:8085,http://192.168.1.212,http://192.168.1.212:8085,http://ips6-server.com,http://gestion.politecnico.ar,https://www.lucasoviedodev.org,https://lucasoviedodev.org
    - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
    - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
    - EMAIL_PORT=${EMAIL_PORT:-587}
    - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
    - EMAIL_HOST_USER=${EMAIL_HOST_USER}
    - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-CFP <soporte@lucasoviedodev.org>}
    - CFP_EMAIL_HOST=${CFP_EMAIL_HOST}
    - CFP_EMAIL_PORT=${CFP_EMAIL_PORT}
    - CFP_EMAIL_USE_TLS=${CFP_EMAIL_USE_TLS}
    - CFP_EMAIL_USE_SSL=${CFP_EMAIL_USE_SSL}
    - CFP_EMAIL_HOST_USER=${CFP_EMAIL_HOST_USER}
    - CFP_EMAIL_HOST_PASSWORD=${CFP_EMAIL_HOST_PASSWORD}
    - CFP_FROM_EMAIL=${CFP_FROM_EMAIL}
    - TERCIARIO_FROM_EMAIL=${TERCIARIO_FROM_EMAIL}
    - FRONTEND_URL=${FRONTEND_URL:-http://gestion.politecnico.ar}
    networks:
    - cfp_network
    restart: always
    volumes:
    - media_data:/app/media
  db:
    container_name: cfp_db_prod
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-CFP}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER:-cfp_user}
    image: mysql:8.0
    networks:
    - cfp_network
    ports:
    - 127.0.0.1:3308:3306
    restart: always
    volumes:
    - db_data:/var/lib/mysql
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cfp_frontend_prod
    depends_on:
    - backend
    networks:
    - cfp_network
    ports:
    - 80:80
    - 443:443
    restart: always
    volumes:
    - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    - /etc/letsencrypt:/etc/letsencrypt:ro
    - media_data:/app/media:ro
volumes:
  db_data: null
  media_data: null
